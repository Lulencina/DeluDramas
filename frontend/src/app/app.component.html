<div style="padding: 20px; font-family: Arial, sans-serif;">
  <h1>Mi Catálogo Asiático ⛩️</h1>

  <div style="margin-bottom: 30px;">
    <input 
      type="text" 
      placeholder="Busca tu serie o actriz favorita (ej: LingLing)..." 
      (input)="buscar($event)"
      style="padding: 10px; width: 100%; max-width: 400px; border-radius: 5px; border: 1px solid #ddd;"
    >
  </div>

  <div style="display: flex; flex-wrap: wrap; gap: 20px;">
    <div *ngFor="let s of series" style="border: 1px solid #eee; border-radius: 10px; padding: 10px; width: 200px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1);">
      <img [src]="'https://image.tmdb.org/t/p/w200' + s.poster_path" 
           alt="{{ s.name || s.title }}" 
           style="width: 100%; border-radius: 5px;">
      <h3 style="font-size: 1rem; margin: 10px 0;">{{ s.name || s.title }}</h3>
      <span style="background: #f0f0f0; padding: 2px 5px; font-size: 0.8rem; border-radius: 3px;">
        {{ s.media_type === 'tv' ? 'Serie' : 'Película' }}
      </span>
    </div>
  </div>
</div>
